<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirim Pengumuman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-500:#2f5fd9;
    --green-400:#188053;
    --amber-400:#a86214;
    --red-400:#c0392b;
    --text-hi:#141a2b;
    --text-mid:#667085;
    --panel-border:#e2e6ef;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    min-height:100%;
    background:#eef1f7;
    font-family:'Inter', sans-serif;
    color:var(--text-hi);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:24px 16px;
  }
  .card{
    width:100%;
    max-width:460px;
    background:#fff;
    border:1px solid var(--panel-border);
    border-radius:18px;
    padding:24px 22px 28px;
    box-shadow:0 8px 24px rgba(20,26,43,.08);
  }
  h1{
    font-size:19px;
    font-weight:800;
    margin-bottom:4px;
  }
  p.sub{
    font-size:12.5px;
    color:var(--text-mid);
    margin-bottom:18px;
  }

  /* Tab switch */
  .tabs{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:20px;
  }
  .tab-btn{
    padding:11px;
    border-radius:12px;
    border:1.5px solid var(--panel-border);
    background:#f7f8fb;
    font-weight:800;
    font-size:13px;
    color:var(--text-mid);
    cursor:pointer;
    text-align:center;
  }
  .tab-btn.active{
    background:var(--blue-500);
    border-color:var(--blue-500);
    color:#fff;
  }

  .panel{ display:none; }
  .panel.active{ display:block; }

  label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--text-mid);
    margin-bottom:6px;
    margin-top:16px;
  }
  label:first-of-type{ margin-top:0; }

  textarea, input[type=text], input[type=number], select{
    width:100%;
    border:1.5px solid var(--panel-border);
    border-radius:12px;
    padding:12px 14px;
    font-family:inherit;
    font-size:14.5px;
    color:var(--text-hi);
    outline:none;
    transition:border-color .15s;
    background:#fff;
  }
  textarea{ resize:vertical; min-height:90px; }
  textarea:focus, input:focus, select:focus{ border-color:var(--blue-500); }
  select{ cursor:pointer; }
  input[readonly]{ background:#f7f8fb; color:var(--text-mid); }

  .type-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
  }
  .type-opt{
    border:1.5px solid var(--panel-border);
    border-radius:12px;
    padding:10px 4px;
    text-align:center;
    font-size:12.5px;
    font-weight:700;
    cursor:pointer;
    user-select:none;
    color:var(--text-mid);
  }
  .type-opt.active[data-type="briefing"]{ background:#eaf1ff; border-color:var(--blue-500); color:var(--blue-500); }
  .type-opt.active[data-type="info"]{ background:#fdf3e7; border-color:var(--amber-400); color:var(--amber-400); }
  .type-opt.active[data-type="urgent"]{ background:#fbeceb; border-color:var(--red-400); color:var(--red-400); }

  .drive-help{
    margin-top:8px;
    font-size:11px;
    line-height:1.5;
    color:var(--text-mid);
  }

  .drive-preview{
    margin-top:12px;
    padding:8px;
    border:1px solid var(--panel-border);
    border-radius:12px;
    background:#f7f8fb;
  }

  .drive-preview img{
    width:100%;
    max-height:220px;
    object-fit:contain;
    border-radius:8px;
    display:block;
  }

  button.send{
    width:100%;
    margin-top:22px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--blue-500);
    color:#fff;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
  }
  .panel[data-mode="sales"] button.send{
    background:linear-gradient(90deg,#a9781f,#e8b647);
    color:#221703;
  }
  button.send:active{ transform:scale(.98); }
  button.send:disabled{ opacity:.6; cursor:default; }

  .status{
    margin-top:14px;
    font-size:13px;
    font-weight:700;
    text-align:center;
    min-height:18px;
  }
  .status.ok{ color:var(--green-400); }
  .status.err{ color:var(--red-400); }

  .hint{
    margin-top:18px;
    font-size:11px;
    color:var(--text-mid);
    line-height:1.5;
  }
</style>
</head>
<body>

<div class="card">
  <h1>📢 Kirim Pengumuman</h1>
  <p class="sub">Pengumuman akan tampil di dashboard selama 30 detik.</p>

  <div class="tabs">
    <div class="tab-btn active" data-tab="text">📢 Pengumuman Biasa</div>
    <div class="tab-btn" data-tab="sales">🏆 Sales Hebat</div>
  </div>

  <!-- PANEL: Pengumuman Biasa -->
  <div class="panel active" id="panelText">
    <label>Jenis Pengumuman</label>
    <div class="type-grid" id="typeGrid">
      <div class="type-opt active" data-type="briefing">📋 Briefing</div>
      <div class="type-opt" data-type="info">📢 Info</div>
      <div class="type-opt" data-type="urgent">🚨 Penting</div>
    </div>

    <label for="pesan">Isi Pengumuman</label>
    <textarea id="pesan" placeholder="Contoh: Briefing sore ini jam 17.00 di ruang meeting" maxlength="200"></textarea>

    <button class="send" id="btnSendText">Kirim ke Dashboard</button>
    <div class="status" id="statusText"></div>
  </div>

  <!-- PANEL: Sales Hebat -->
  <div class="panel" data-mode="sales" id="panelSales">
    <label for="scNama">Pilih Sales</label>
    <select id="scNama">
      <option value="" disabled selected>-- Pilih nama --</option>
    </select>
    <div class="drive-help">
      Foto otomatis diambil dari Google Drive sesuai nama yang dipilih.
    </div>
    <div class="drive-preview" id="fotoPreviewBox" style="display:none;">
      <img id="fotoPreview" alt="Preview foto Sales Hebat">
    </div>

    <label for="scPencapaian">Pencapaian (Rp)</label>
    <input type="number" id="scPencapaian" placeholder="Contoh: 50000000">

    <label for="scProduk">Produk Terjual (unit)</label>
    <input type="number" id="scProduk" placeholder="Contoh: 22">

    <label for="scJudul">Judul Kartu (opsional)</label>
    <input type="text" id="scJudul" placeholder="Default: SALES HEBAT" maxlength="30">

    <button class="send" id="btnSendSales">Kirim ke Dashboard</button>
    <div class="status" id="statusSales"></div>
  </div>

  <div class="hint">
    Pesan akan muncul di layar dashboard dalam ±8 detik setelah dikirim.
  </div>
</div>

<script>
/* =====================================================================
   KONFIGURASI GOOGLE FORM
   Foto Sales Hebat menggunakan link file Google Drive yang sudah publik.
   ===================================================================== */
const FORM_CONFIG = {
  // URL "formResponse" dari Google Form kamu.
  actionUrl: "https://docs.google.com/forms/d/e/1FAIpQLSc8EYOso-OyZtISPX6JocuzGQHk28LsGjLeMaUo2yKqGPbmLQ/formResponse",

 // entry ID tiap pertanyaan di Google Form.
  entryPesan:      "entry.17263440",
  entryTipe:       "entry.1267418841",
  entryNama:       "entry.1484666681",
  entryPencapaian: "entry.1159040072",
  entryProduk:     "entry.357565826",
  entryJudul:      "entry.1748093992",
  entryFoto:       "entry.1559904346"
};

/* =====================================================================
   DAFTAR FOTO SALES (Google Drive)
   Tambah/ubah nama & link di sini kalau ada sales baru atau foto diganti.
   ===================================================================== */
const SALES_PHOTOS = {
  "Amel":    "https://drive.google.com/file/d/1rkPPESpvu-HnIMG-WhDLfVlMN3k60CT8/view",
  "Amin":    "https://drive.google.com/file/d/1j5fD1T3VBtg_07fCQTC-YCrtVV8phCaA/view",
  "Divan":   "https://drive.google.com/file/d/1eGTD-R7lsppL7xyxsjyRWTYh8hqcFJFg/view",
  "Erni":    "https://drive.google.com/file/d/1aj9eP-QF0wHmgePcB5tCfC4aIaGphIDE/view",
  "Fadli":   "https://drive.google.com/file/d/1N1eqW5wKkgnpAEUxUrS9UwgyuVjBaCWC/view",
  "Hana":    "https://drive.google.com/file/d/1EGn_i-lr_sHGYbF4TcjVGtQ3_kYgpIrz/view",
  "Ilham":   "https://drive.google.com/file/d/1ISbvLpq1VI3Wqxl4GOyg3rJqIyBJ02_F/view",
  "Indri":   "https://drive.google.com/file/d/1YeM9Uf93k_qwfaTWqPU7iuac4ucsBd9a/view",
  "Irfan":   "https://drive.google.com/file/d/1G1-SIQYzUwGkgwu4Dkmo_kBrO6ZqZefe/view",
  "Jeannet": "https://drive.google.com/file/d/1SkISxkkOonYljllhaTFWbNglxwwV8lso/view",
  "Kiki":    "https://drive.google.com/file/d/1AnvEOzTJa5YagFVEdxRpGEVkqXbIs6RS/view",
  "Melin":   "https://drive.google.com/file/d/1QLcn52dojKApzvyIHvrsSklj4mV58s-5/view"
};

/* ---------------- Tab switch ---------------- */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const tab = btn.dataset.tab;
    document.getElementById("panelText").classList.toggle("active", tab === "text");
    document.getElementById("panelSales").classList.toggle("active", tab === "sales");
  });
});

/* ---------------- Panel: Pengumuman Biasa ---------------- */
let selectedType = "briefing";

document.querySelectorAll("#typeGrid .type-opt").forEach(opt => {
  opt.addEventListener("click", () => {
    document.querySelectorAll("#typeGrid .type-opt").forEach(o => o.classList.remove("active"));
    opt.classList.add("active");
    selectedType = opt.dataset.type;
  });
});

const btnSendText  = document.getElementById("btnSendText");
const pesanEl       = document.getElementById("pesan");
const statusTextEl  = document.getElementById("statusText");

btnSendText.addEventListener("click", async () => {
  const pesan = pesanEl.value.trim();

  if(!pesan){
    setStatus(statusTextEl, "Isi pengumuman dulu ya.", "err");
    return;
  }

  btnSendText.disabled = true;
  setStatus(statusTextEl, "Mengirim...", "");

  const body = new FormData();
  body.append(FORM_CONFIG.entryPesan, pesan);
  body.append(FORM_CONFIG.entryTipe, selectedType);

  try{
    await submitToForm(body);
    setStatus(statusTextEl, "✅ Terkirim! Akan tampil di dashboard sebentar lagi.", "ok");
    pesanEl.value = "";
  } catch(err){
    console.error(err);
    setStatus(statusTextEl, "Gagal mengirim: " + (err.message || err), "err");
  } finally {
    btnSendText.disabled = false;
  }
});

/* ---------------- Panel: Sales Hebat ---------------- */
const namaSelect     = document.getElementById("scNama");
const fotoPreview    = document.getElementById("fotoPreview");
const fotoPreviewBox = document.getElementById("fotoPreviewBox");
const btnSendSales   = document.getElementById("btnSendSales");
const statusSalesEl  = document.getElementById("statusSales");

// Isi dropdown dari daftar SALES_PHOTOS (urut sesuai abjad nama).
Object.keys(SALES_PHOTOS).sort((a, b) => a.localeCompare(b)).forEach(nama => {
  const opt = document.createElement("option");
  opt.value = nama;
  opt.textContent = nama;
  namaSelect.appendChild(opt);
});

namaSelect.addEventListener("change", showDrivePreview);

fotoPreview.addEventListener("load", () => {
  fotoPreviewBox.style.display = "block";
  if(statusSalesEl.textContent.includes("Foto tidak dapat")){
    setStatus(statusSalesEl, "", "");
  }
});

fotoPreview.addEventListener("error", () => {
  fotoPreviewBox.style.display = "none";
  if(namaSelect.value){
    setStatus(
      statusSalesEl,
      "Foto tidak dapat dibuka. Pastikan akses Drive file ini sudah publik.",
      "err"
    );
  }
});

function showDrivePreview(){
  const linkDrive = SALES_PHOTOS[namaSelect.value];
  const fotoUrl = convertGoogleDriveUrl(linkDrive);

  if(!fotoUrl){
    fotoPreview.removeAttribute("src");
    fotoPreviewBox.style.display = "none";
    return;
  }

  fotoPreviewBox.style.display = "none";
  fotoPreview.src = fotoUrl;
}

btnSendSales.addEventListener("click", async () => {
  const nama       = namaSelect.value;
  const pencapaian = document.getElementById("scPencapaian").value.trim();
  const produk     = document.getElementById("scProduk").value.trim();
  const judul      = document.getElementById("scJudul").value.trim();

  if(!nama){
    setStatus(statusSalesEl, "Pilih nama sales dulu ya.", "err");
    return;
  }

  const linkDrive = SALES_PHOTOS[nama];
  const fotoUrl = convertGoogleDriveUrl(linkDrive);
  if(!fotoUrl){
    setStatus(
      statusSalesEl,
      "Link foto untuk nama ini tidak valid. Cek daftar SALES_PHOTOS di kode.",
      "err"
    );
    return;
  }

  btnSendSales.disabled = true;

  try{
    setStatus(statusSalesEl, "Mengirim ke dashboard...", "");

    const body = new FormData();
    body.append(FORM_CONFIG.entryTipe, "sales");
    body.append(FORM_CONFIG.entryNama, nama);
    body.append(FORM_CONFIG.entryPencapaian, pencapaian);
    body.append(FORM_CONFIG.entryProduk, produk);
    body.append(FORM_CONFIG.entryJudul, judul);
    body.append(FORM_CONFIG.entryFoto, fotoUrl);

    await submitToForm(body);

    setStatus(statusSalesEl, "✅ Terkirim! Kartu akan tampil di dashboard sebentar lagi.", "ok");
    namaSelect.selectedIndex = 0;
    document.getElementById("scPencapaian").value = "";
    document.getElementById("scProduk").value = "";
    document.getElementById("scJudul").value = "";
    fotoPreview.removeAttribute("src");
    fotoPreviewBox.style.display = "none";
  } catch(err){
    console.error(err);
    setStatus(statusSalesEl, "Gagal mengirim: " + (err.message || err), "err");
  } finally {
    btnSendSales.disabled = false;
  }
});

/* ---------------- Helper ---------------- */
function setStatus(el, text, cls){
  el.textContent = text;
  el.className = "status" + (cls ? " " + cls : "");
}

async function submitToForm(formData){
  /*
   * mode "no-cors" wajib untuk submit ke Google Form dari luar
   * domain Google. Responsnya opaque (tidak bisa dibaca), jadi
   * kita anggap sukses selama tidak ada error jaringan.
   */
  await fetch(FORM_CONFIG.actionUrl, {
    method: "POST",
    mode: "no-cors",
    body: formData
  });
}

function convertGoogleDriveUrl(url){
  if(!url) return null;

  // Jika URL sudah berupa URL thumbnail hasil konversi, gunakan langsung.
  if(/^https:\/\/drive\.google\.com\/thumbnail\?/i.test(url)){
    return url;
  }

  let fileId = null;

  // Format umum: https://drive.google.com/file/d/FILE_ID/view
  const fileMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(fileMatch){
    fileId = fileMatch[1];
  }

  // Format lain: open?id=FILE_ID atau uc?id=FILE_ID
  if(!fileId){
    try{
      const parsedUrl = new URL(url);
      if(parsedUrl.hostname !== "drive.google.com") return null;
      fileId = parsedUrl.searchParams.get("id");
    } catch(error){
      return null;
    }
  }

  if(!fileId) return null;

  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1600`;
}
</script>

</body>
</html>
